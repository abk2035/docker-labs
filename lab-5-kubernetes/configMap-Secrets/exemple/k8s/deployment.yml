apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi-app

  template:
    metadata:
      labels:
        app: fastapi-app

    spec:
      containers:

      - name: fastapi

        image: fastapi-app:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        envFrom:

        - configMapRef:
            name: fastapi-config

        - secretRef:
            name: fastapi-secret